spring:
  application:
    name: relay-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/relay}
    username: ${SPRING_DATASOURCE_USERNAME:relay}
    password: ${SPRING_DATASOURCE_PASSWORD:relay}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: relay
      auto-offset-reset: earliest
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: ${SMTP_SSL:true}        # port 465 (SSL)
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:false}  # set true + SSL false for port 587
      mail.smtp.connectiontimeout: 8000
      mail.smtp.timeout: 8000
  graphql:
    graphiql:
      enabled: true
    path: /graphql

server:
  port: 8080

relay:
  cors:
    # Comma-separated browser origins allowed to call the API directly. Behind nginx the app is
    # same-origin so CORS isn't exercised; these cover split-origin dev / direct access.
    allowed-origins: ${RELAY_CORS_ORIGINS:http://localhost,http://localhost:3000,http://localhost:8080}
  auth:
    # dev default; override RELAY_AUTH_JWT_SECRET in any real environment (min 32 chars)
    jwt-secret: ${RELAY_AUTH_JWT_SECRET:relay-dev-secret-change-me-0123456789-abcdef}
    jwt-ttl-days: 7
  admin:
    # platform Ops-console admin, ensured at startup; CHANGE in production
    email: ${RELAY_ADMIN_EMAIL:admin@relay.dev}
    password: ${RELAY_ADMIN_PASSWORD:admin12345}
  app:
    base-url: ${APP_BASE_URL:http://localhost:8081}
  mail:
    from: ${MAIL_FROM:no-reply@relay.dev}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    # empty → derive redirect from the request host (multi-domain friendly)
    redirect-uri: ${GOOGLE_REDIRECT_URI:}
  sms:
    fast2sms-key: ${FAST2SMS_API_KEY:}
  clickhouse:
    url: ${RELAY_CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123/relay}
    user: ${RELAY_CLICKHOUSE_USER:relay}
    password: ${RELAY_CLICKHOUSE_PASSWORD:relay}
  temporal:
    target: ${RELAY_TEMPORAL_TARGET:localhost:7233}
    namespace: default
    task-queue: relay-launch
  s3:
    endpoint: ${RELAY_S3_ENDPOINT:http://localhost:9002}
    access-key: ${RELAY_S3_ACCESS_KEY:relay}
    secret-key: ${RELAY_S3_SECRET_KEY:relay-secret}
    bucket: ${RELAY_S3_BUCKET:relay-creatives}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.relay: DEBUG
